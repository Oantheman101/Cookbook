<script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

// ── SERVING ADJUSTER ─────────────────────────────────────────
function ServingAdjuster({ r, T }) {
  const [sv, setSv] = useState(r.sv);
  const ratio = sv / r.sv;
  function scaleIng(str) {
    const m1 = str.match(/^([\d.]+)(g|ml|kg|l)\s+(.+)$/);
    if (m1) { const s=Math.round(parseFloat(m1[1])*ratio*10)/10; return `${s%1===0?s.toFixed(0):s.toFixed(1)}${m1[2]} ${m1[3]}`; }
    const m2 = str.match(/^([\d.]+)\s+(.+)$/);
    if (m2) { const s=Math.round(parseFloat(m2[1])*ratio*10)/10; return `${s%1===0?s.toFixed(0):s.toFixed(1)} ${m2[2]}`; }
    return str;
  }
  return (
    <div>
      <div style={{ margin:'12px 18px 0', background:T.surface2, borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
        <span style={{ fontSize:12, fontWeight:600, color:T.textSec, flex:1 }}>Servings</span>
        <button onClick={()=>setSv(s=>Math.max(1,s-1))} style={{ width:28,height:28,borderRadius:50,border:`1px solid ${T.borderLight}`,background:T.surface3,color:T.text,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>−</button>
        <span style={{ fontFamily:"'Space Mono',monospace",fontSize:16,fontWeight:700,color:T.accent,minWidth:24,textAlign:'center' }}>{sv}</span>
        <button onClick={()=>setSv(s=>s+1)} style={{ width:28,height:28,borderRadius:50,border:`1px solid ${T.borderLight}`,background:T.surface3,color:T.text,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>+</button>
      </div>
      {ratio !== 1 && (
        <div style={{ padding:'10px 18px 0' }}>
          {r.ig.map((ing,i) => <div key={i} style={{ fontSize:12,color:T.textSec,padding:'4px 0',borderBottom:`1px solid ${T.border}` }}>{scaleIng(ing)}</div>)}
        </div>
      )}
    </div>
  );
}

// ── RECIPES VIEW ─────────────────────────────────────────────
function RecipesView({ T, favs, toggleFav, groceryList, toggleGrocery }) {
  const [search, setSearch]       = useState('');
  const [activeCat, setActiveCat] = useState('All');
  const [sortIdx, setSortIdx]     = useState(0);
  const [showMP, setShowMP]       = useState(false);
  const [showNO, setShowNO]       = useState(false);
  const [selected, setSelected]   = useState(null);

  const all = window.RECIPES || [];
  const recipes = all.filter(r => {
    if (activeCat==='Favorites' && !favs.includes(r.n)) return false;
    if (activeCat!=='All' && activeCat!=='Favorites' && r.c!==activeCat) return false;
    if (showMP && !r.mp) return false;
    if (showNO && !r.no) return false;
    if (search) return [r.n,r.c,r.m,...r.ig,r.nt].join(' ').toLowerCase().includes(search.toLowerCase());
    return true;
  }).sort((a,b)=>{
    const sk=SORTS[sortIdx].k;
    if(sk==='p-desc') return b.p-a.p; if(sk==='p-asc') return a.p-b.p;
    if(sk==='c-asc')  return a.cal-b.cal; if(sk==='c-desc') return b.cal-a.cal;
    return 0;
  });

  return (
    <div style={{ display:'flex',flexDirection:'column',height:'100%' }}>
      <div style={{ padding:'0 14px 10px',background:`${T.bg}E8`,backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderBottom:`1px solid ${T.border}`,flexShrink:0 }}>
        <div style={{ position:'relative',marginBottom:10 }}>
          <svg style={{ position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:T.textDim,pointerEvents:'none' }} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search recipes or ingredients…" style={{ width:'100%',padding:'10px 12px 10px 34px',background:T.surface,border:`1px solid ${search?T.accent:T.border}`,borderRadius:12,color:T.text,fontFamily:"'Outfit',sans-serif",fontSize:14,fontWeight:500,outline:'none',boxSizing:'border-box',transition:'border-color 0.15s' }} />
          {search && <button onClick={()=>setSearch('')} style={{ position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:T.textDim,cursor:'pointer',fontSize:18 }}>×</button>}
        </div>
        <div style={{ display:'flex',gap:7,overflowX:'auto',scrollbarWidth:'none',paddingBottom:2,marginBottom:8 }}>
          {CATS.map(cat=>(
            <span key={cat} onClick={()=>setActiveCat(cat)} style={{ padding:'7px 14px',borderRadius:100,background:activeCat===cat?T.accent:T.surface,border:`1px solid ${activeCat===cat?T.accent:T.border}`,color:activeCat===cat?'#fff':T.textSec,fontSize:11,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,transition:'all 0.15s' }}>
              {cat==='Favorites'?'♥ Favs':cat}
            </span>
          ))}
        </div>
        <div style={{ display:'flex',gap:6,alignItems:'center' }}>
          {[{id:'mp',label:'Meal Prep',active:showMP,toggle:()=>setShowMP(s=>!s)},{id:'ov',label:'No Oven',active:showNO,toggle:()=>setShowNO(s=>!s)}].map(({id,label,active,toggle})=>(
            <span key={id} onClick={toggle} style={{ display:'flex',alignItems:'center',gap:5,padding:'5px 12px',borderRadius:100,background:active?T.accentSoft:T.surface,border:`1px solid ${active?T.accent:T.border}`,color:active?T.accent:T.textSec,fontSize:11,fontWeight:600,cursor:'pointer',transition:'all 0.15s' }}>
              <div style={{ width:7,height:7,borderRadius:50,background:active?T.accent:T.textDim }} />{label}
            </span>
          ))}
          <span onClick={()=>setSortIdx(i=>(i+1)%SORTS.length)} style={{ marginLeft:'auto',padding:'5px 12px',borderRadius:100,background:sortIdx>0?T.accentSoft:T.surface,border:`1px solid ${sortIdx>0?T.accent:T.border}`,color:sortIdx>0?T.accent:T.textSec,fontSize:11,fontWeight:600,cursor:'pointer' }}>
            {SORTS[sortIdx].l} ↕
          </span>
        </div>
        <div style={{ fontFamily:"'Space Mono',monospace",fontSize:9,color:T.textDim,textAlign:'center',marginTop:7 }}>{recipes.length} recipe{recipes.length!==1?'s':''}</div>
      </div>
      <div style={{ flex:1,overflowY:'auto',padding:'12px 14px 20px',display:'flex',flexDirection:'column',gap:9 }}>
        {recipes.length===0 ? (
          <div style={{ textAlign:'center',padding:'60px 0' }}>
            <div style={{ fontSize:36,marginBottom:12 }}>{activeCat==='Favorites'?'💔':'🔍'}</div>
            <div style={{ fontFamily:"'Outfit',sans-serif",fontSize:15,fontWeight:700,color:T.textSec,marginBottom:4 }}>{activeCat==='Favorites'?'No favorites yet':'No recipes found'}</div>
            <div style={{ fontSize:12,color:T.textDim }}>{activeCat==='Favorites'?'Tap ♥ on any recipe.':'Try a different search.'}</div>
          </div>
        ) : recipes.map(r=>(
          <BlockCard key={r.n} r={r} T={T}
            isFav={favs.includes(r.n)} onFav={toggleFav}
            inGrocery={groceryList.includes(r.n)} onGrocery={toggleGrocery}
            onOpen={setSelected} />
        ))}
      </div>
      {selected && <RecipeModal r={selected} T={T} isFav={favs.includes(selected.n)} onFav={toggleFav} inGrocery={groceryList.includes(selected.n)} onGrocery={toggleGrocery} onClose={()=>setSelected(null)} />}
    </div>
  );
}

                    <div key={r.n} onClick={()=>toggleGrocery(r.n)} style={{ display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:12,background:active?`${cc}14`:T.surface,border:`1.5px solid ${active?cc:T.border}`,cursor:'pointer',transition:'all 0.15s' }}>
                      <div style={{ width:20,height:20,borderRadius:6,border:`1.5px solid ${active?cc:T.border}`,background:active?cc:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.15s' }}>
                        {active && <svg width="11" height="9" viewBox="0 0 11 9"><path d="M1.5 4.5l3 3 5-7" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>}
                      </div>
                      <div style={{ flex:1,minWidth:0 }}>
                        <div style={{ fontFamily:"'Outfit',sans-serif",fontSize:13,fontWeight:700,color:T.text }}>{r.n}</div>
                        <div style={{ fontSize:10,color:T.textDim,marginTop:2 }}>{r.ig.length} ingredients · {r.cal} kcal</div>
                      </div>
                      <svg width="10" height="9" viewBox="0 0 24 22" fill="#FF6482"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    </div>
                  );
                })}
              </div>
          }
        </div>

        {/* ── All recipes section ── */}
        <div style={{ padding:'6px 16px 8px' }}>
          <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10 }}>
            <div style={{ display:'flex',alignItems:'center',gap:6 }}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={T.textSec} strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <span style={{ fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.1em',color:T.textSec }}>All Recipes</span>
            </div>
            <span onClick={()=>{ setPSearch(''); setShowPicker(true); }} style={{ fontSize:11,fontWeight:700,color:T.accent,cursor:'pointer',padding:'4px 10px',borderRadius:100,background:T.accentSoft }}>+ Add</span>
          </div>
          {(() => {
            const nonFavAdded = groceryList.filter(n=>!favs.includes(n)).map(n=>all.find(r=>r.n===n)).filter(Boolean);
            return nonFavAdded.length===0
              ? <div style={{ fontSize:12,color:T.textDim,padding:'4px 0 8px' }}>Tap + Add to include any recipe.</div>
              : <div style={{ display:'flex',flexDirection:'column',gap:7 }}>
                  {nonFavAdded.map(r=>{
                    const cc=CAT_COLOR[r.c];
                    return (
                      <div key={r.n} style={{ display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:12,background:`${cc}14`,border:`1.5px solid ${cc}40` }}>
                        <div style={{ flex:1 }}>
                          <div style={{ fontFamily:"'Outfit',sans-serif",fontSize:13,fontWeight:700,color:T.text }}>{r.n}</div>
                          <div style={{ fontSize:10,color:T.textDim,marginTop:2 }}>{r.ig.length} ingredients · {r.cal} kcal</div>
                        </div>
                        <button onClick={()=>toggleGrocery(r.n)} style={{ background:'none',border:'none',cursor:'pointer',color:T.textDim,fontSize:20,lineHeight:1,padding:'0 4px' }}>×</button>
                      </div>
                    );
                  })}
                </div>;
          })()}
        </div>

        {/* ── Shopping list ── */}
        {activeRecipes.length > 0 && (
          <div style={{ padding:'6px 16px 0' }}>
            <div style={{ fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.1em',color:T.textDim,marginBottom:12 }}>Shopping List</div>
            {activeRecipes.map(recipe=>{
              const isFavR=favs.includes(recipe.n);
              const cc=CAT_COLOR[recipe.c];
              const allDone=recipe.ig.every((_,i)=>checked[`${recipe.n}-${i}`]);
              return (
                <div key={recipe.n} style={{ marginBottom:16 }}>
                  <div style={{ display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:9,background:T.surface2,marginBottom:4 }}>
                    {isFavR
                      ? <svg width="10" height="9" viewBox="0 0 24 22" fill="#FF6482"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                      : <div style={{ width:10,height:10,borderRadius:3,background:cc,opacity:0.7 }} />
                    }
                    <span style={{ flex:1,fontFamily:"'Outfit',sans-serif",fontSize:12,fontWeight:700,color:allDone?T.textDim:T.text,textDecoration:allDone?'line-through':'none' }}>{recipe.n}</span>
                    <span style={{ fontSize:9,color:T.textDim }}>{recipe.ig.length} items</span>
                  </div>
                  {recipe.ig.map((ing,i)=>{
                    const key=`${recipe.n}-${i}`;
                    const done=checked[key];
                    return (
                      <div key={i} onClick={()=>toggleCheck(key)} style={{ display:'flex',alignItems:'center',gap:12,padding:'9px 10px',borderBottom:`1px solid ${T.border}`,cursor:'pointer' }}>
                        <div style={{ width:18,height:18,borderRadius:5,border:`1.5px solid ${done?cc:T.border}`,background:done?cc:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.15s' }}>
                          {done && <svg width="10" height="8" viewBox="0 0 11 9"><path d="M1.5 4.5l3 3 5-7" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>}
                        </div>
                        <span style={{ fontSize:13,color:done?T.textDim:T.text,textDecoration:done?'line-through':'none',lineHeight:1.4,transition:'color 0.15s' }}>{ing}</span>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Picker sheet */}
      {showPicker && (
        <div style={{ position:'absolute',inset:0,zIndex:200,background:'rgba(0,0,0,0.65)',display:'flex',alignItems:'flex-end' }} onClick={()=>setShowPicker(false)}>
          <div onClick={e=>e.stopPropagation()} style={{ background:T.surface,borderRadius:'22px 22px 0 0',width:'100%',maxHeight:'80%',display:'flex',flexDirection:'column' }}>
            <div style={{ padding:'10px 16px 12px',borderBottom:`1px solid ${T.border}`,flexShrink:0 }}>
              <div style={{ width:38,height:4,borderRadius:2,background:T.border,display:'block',margin:'0 auto 12px' }} />
              <div style={{ fontFamily:"'Outfit',sans-serif",fontSize:14,fontWeight:700,color:T.text,marginBottom:10 }}>Add a recipe</div>
              <input autoFocus value={pickerSearch} onChange={e=>setPSearch(e.target.value)} placeholder="Search…" style={{ width:'100%',padding:'8px 12px',background:T.surface2,border:`1px solid ${T.border}`,borderRadius:9,color:T.text,fontFamily:"'Outfit',sans-serif",fontSize:13,outline:'none',boxSizing:'border-box' }} />
            </div>
            <div style={{ overflowY:'auto' }}>
              {pickerFiltered.map(r=>{
                const active=groceryList.includes(r.n);
                return (
                  <div key={r.n} onClick={()=>{ toggleGrocery(r.n); if(!active) setShowPicker(false); }} style={{ display:'flex',alignItems:'center',gap:10,padding:'11px 16px',borderBottom:`1px solid ${T.border}`,cursor:'pointer',opacity:active?0.45:1 }}>
                    <div style={{ width:7,height:7,borderRadius:2,background:CAT_COLOR[r.c],flexShrink:0 }} />
                    <div style={{ flex:1 }}>
                      <div style={{ fontFamily:"'Outfit',sans-serif",fontSize:13,fontWeight:600,color:T.text }}>{r.n}</div>
                      <div style={{ fontFamily:"'Space Mono',monospace",fontSize:10,color:T.textSec }}>{r.cal} cal · {r.p}g P</div>
                    </div>
                    {favs.includes(r.n) && <svg width="10" height="9" viewBox="0 0 24 22" fill="#FF6482"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>}
                    {active && <span style={{ fontSize:10,color:T.textDim }}>added</span>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SETTINGS VIEW ────────────────────────────────────────────
function SettingsView({ T, theme, setTheme }) {
  return (
    <div style={{ flex:1,overflowY:'auto',padding:'20px 16px' }}>
      <div style={{ fontFamily:"'Outfit',sans-serif",fontSize:11,fontWeight:800,color:T.textDim,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:14 }}>Theme</div>
      <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
        {Object.entries(THEMES).map(([k,v])=>{
          const active=theme===k;
          return (
            <div key={k} onClick={()=>setTheme(k)} style={{ display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:14,background:active?`${v.accent}18`:T.surface,border:`1.5px solid ${active?v.accent:T.border}`,cursor:'pointer',transition:'all 0.15s' }}>
              <div style={{ width:32,height:32,borderRadius:10,background:v.bg,border:`2px solid ${v.accent}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0 }}>
                <div style={{ width:14,height:14,borderRadius:4,background:v.accent }} />
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:"'Outfit',sans-serif",fontSize:14,fontWeight:700,color:T.text }}>{v.name}</div>
                <div style={{ fontSize:11,color:T.textSec,marginTop:2 }}>{v.bg}</div>
              </div>
              {active && <div style={{ width:22,height:22,borderRadius:50,background:v.accent,display:'flex',alignItems:'center',justifyContent:'center' }}><svg width="11" height="9" viewBox="0 0 11 9"><path d="M1.5 4.5l3 3 5-7" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg></div>}
            </div>
          );
        })}
      </div>
      <div style={{ marginTop:32,padding:'14px 16px',borderRadius:14,background:T.surface,border:`1px solid ${T.border}` }}>
        <div style={{ fontFamily:"'Outfit',sans-serif",fontSize:13,fontWeight:700,color:T.text,marginBottom:4 }}>The Snack Box</div>
        <div style={{ fontSize:11,color:T.textSec }}>{(window.RECIPES||[]).length} recipes · Built with love</div>
      </div>
    </div>
  );
}

// ── BOTTOM TAB BAR ───────────────────────────────────────────
function BottomTabBar({ tab, setTab, T, groceryCount }) {
  const tabs = [
    { id:'recipes',  label:'Recipes',
      icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg> },
    { id:'grocery',  label:'Grocery',  badge: groceryCount > 0 ? groceryCount : null,
      icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> },
    { id:'settings', label:'Settings',
      icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg> },
  ];
  return (
    <div style={{ display:'flex',borderTop:`1px solid ${T.border}`,background:T.bg,paddingBottom:28,flexShrink:0 }}>
      {tabs.map(({ id, label, icon, badge })=>{
        const active=tab===id;
        return (
          <div key={id} onClick={()=>setTab(id)} style={{ flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'10px 0 4px',cursor:'pointer',color:active?T.accent:T.textDim,transition:'color 0.15s',gap:3,position:'relative' }}>
            <div style={{ position:'relative' }}>
              {icon}
              {badge && <div style={{ position:'absolute',top:-4,right:-6,background:T.accent,color:'#fff',fontFamily:"'Space Mono',monospace",fontSize:8,fontWeight:700,minWidth:14,height:14,borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px' }}>{badge}</div>}
            </div>
            <span style={{ fontSize:10,fontWeight:active?700:500,fontFamily:"'Outfit',sans-serif" }}>{label}</span>
            {active && <div style={{ width:20,height:2,borderRadius:1,background:T.accent }} />}
          </div>
        );
      })}
    </div>
  );
}

// ── ROOT ─────────────────────────────────────────────────────
function PrepBoxApp() {
  const defaults = window.TWEAK_DEFAULTS || { theme:'ember' };
  const [theme, setTheme_]         = useState(defaults.theme || 'ember');
  const [tab, setTab]              = useState('recipes');
  const [favs, setFavs]            = useState(()=>{ try { return JSON.parse(localStorage.getItem('prepbox-favs')||'[]'); } catch { return []; } });
  const [groceryList, setGrocery]  = useState(()=>{ try { return JSON.parse(localStorage.getItem('prepbox-grocery')||'[]'); } catch { return []; } });

  const T = THEMES[theme] || THEMES.ember;
  useEffect(()=>{ localStorage.setItem('prepbox-favs', JSON.stringify(favs)); }, [favs]);
  useEffect(()=>{ localStorage.setItem('prepbox-grocery', JSON.stringify(groceryList)); }, [groceryList]);

  useEffect(()=>{
    window.addEventListener('message', ()=>{});
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
  }, []);

  const setTheme    = v => { setTheme_(v); window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ theme:v } }, '*'); };
  const toggleFav   = name => setFavs(p => p.includes(name) ? p.filter(n=>n!==name) : [...p, name]);
  const toggleGrocery = name => setGrocery(p => p.includes(name) ? p.filter(n=>n!==name) : [...p, name]);

  return (
    <div style={{ display:'flex',justifyContent:'center',alignItems:'center',minHeight:'100vh',background:'#090909',fontFamily:"'Outfit',sans-serif" }}>
      <IOSDevice width={393} height={852} dark={true}>
        <div style={{ display:'flex',flexDirection:'column',height:'100%',background:T.bg,overflow:'hidden',position:'relative' }}>
          <div style={{ height:60,flexShrink:0 }} />
          {/* Centered hero */}
          <div style={{ padding:'4px 18px 16px',textAlign:'center',position:'relative',flexShrink:0 }}>
            <div style={{ position:'absolute',top:-60,left:'50%',transform:'translateX(-50%)',width:340,height:340,background:`radial-gradient(circle, ${T.accentMid} 0%, transparent 65%)`,pointerEvents:'none' }} />
            <div style={{ fontSize:38,marginBottom:6,display:'inline-block',animation:'bounce 2s ease-in-out infinite' }}>🍱</div>
            <div style={{ fontFamily:"'Outfit',sans-serif",fontSize:26,fontWeight:900,letterSpacing:'-0.03em',lineHeight:1.1,color:T.text }}>
              The Snack <span style={{ color:T.accent }}>Box</span>
            </div>
            <div style={{ fontSize:11,color:T.textSec,marginTop:4 }}>Your meal prep cheat code.</div>
          </div>
          {/* Tab content */}
          <div style={{ flex:1,overflow:'hidden',display:'flex',flexDirection:'column' }}>
            {tab==='recipes'  && <RecipesView T={T} favs={favs} toggleFav={toggleFav} groceryList={groceryList} toggleGrocery={toggleGrocery} />}
            {tab==='grocery'  && <GroceryView T={T} favs={favs} groceryList={groceryList} toggleGrocery={toggleGrocery} />}
            {tab==='settings' && <SettingsView T={T} theme={theme} setTheme={setTheme} />}
          </div>
          <BottomTabBar tab={tab} setTab={setTab} T={T} groceryCount={groceryList.length} />
        </div>
      </IOSDevice>
      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}`}</style>
    </div>
  );
}

Object.assign(window, { PrepBoxApp });

</script>

<!-- Boot + Tweaks defaults -->

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

}/*EDITMODE-END*/;
window.TWEAK_DEFAULTS = TWEAK_DEFAULTS;
ReactDOM.createRoot(document.getElementById('root')).render(<PrepBoxApp />);
</script>
