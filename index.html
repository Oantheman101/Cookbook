<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>The Snack Box</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🍱</text></svg>">
<meta property="og:title" content="The Snack Box">

<meta name="twitter:description" content="The Snack Box">

<style>
:root {
  --bg: #111111;
  --surface: #1C1C1E;
  --surface2: #252528;
  --surface3: #2F2F34;
  --border: rgba(255,255,255,0.08);
  --border-light: rgba(255,255,255,0.12);
  --text: #F5F5F7;
  --text-secondary: #98989F;
  --text-dim: #636366;

  --fire: #FF6B35;
  --fire-soft: rgba(255,107,53,0.12);
  --fire-mid: rgba(255,107,53,0.25);
  --lime: #32D74B;
  --lime-soft: rgba(50,215,75,0.12);
  --sky: #64D2FF;
  --sky-soft: rgba(100,210,255,0.12);
  --gold: #FFD60A;
  --gold-soft: rgba(255,214,10,0.12);
  --grape: #BF5AF2;
  --grape-soft: rgba(191,90,242,0.12);
  --coral: #FF6482;
  --coral-soft: rgba(255,100,130,0.12);
  --mint: #66D4CF;
  --mint-soft: rgba(102,212,207,0.12);

  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Outfit', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ─── HERO ─── */
.hero {
  padding: 48px 20px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -80px; left: 50%;
  transform: translateX(-50%);
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,107,53,0.10) 0%, transparent 65%);
  pointer-events: none;
}
.hero-emoji {
  font-size: 3rem;
  display: block;
  margin-bottom: 8px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.hero h1 {
  font-size: 2.2rem;
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.1;
  position: relative;
}
.hero h1 .accent { color: var(--fire); }
.hero .subtitle {
  color: var(--text-secondary);
  font-size: 0.95rem;
  margin-top: 6px;
  font-weight: 400;
}


/* ─── STICKY CONTROLS ─── */
.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(17,17,17,0.85);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
}

/* Search */
.search-wrap {
  position: relative;
  margin-bottom: 10px;
}
.search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  color: var(--text-dim);
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 11px 44px 11px 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 16px; /* prevents iOS zoom */
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--fire); }
.search-input::placeholder { color: var(--text-dim); font-weight: 400; }
.search-clear {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--surface2);
  border: none;
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
}
.search-clear.show { display: flex; }

/* Filter chips — horizontal scroll */
.chips-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 2px 0;
  margin-bottom: 8px;
}
.chips-scroll::-webkit-scrollbar { display: none; }

.chip {
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  user-select: none;
  -webkit-user-select: none;
}
.chip:active { transform: scale(0.95); }
.chip.active {
  background: var(--fire);
  border-color: var(--fire);
  color: #fff;
}

/* Toggle bar */
.toggles {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.toggle-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: all 0.2s;
}
.toggle-pill:active { transform: scale(0.95); }
.toggle-pill input { display: none; }
.toggle-pill.active {
  background: var(--lime-soft);
  border-color: var(--lime);
  color: var(--lime);
}
.toggle-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: background 0.2s;
}
.toggle-pill.active .toggle-dot { background: var(--lime); }

.sort-pill {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
}
.sort-pill:active { transform: scale(0.95); }
.sort-pill.active { border-color: var(--fire); color: var(--fire); }

.result-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  padding: 6px 0 0;
  text-align: center;
}

/* ─── RECIPE LIST ─── */
.recipe-list {
  padding: 12px 16px 100px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ─── CARD ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.2s;
  -webkit-user-select: none;
  user-select: none;
}
.card:active { transform: scale(0.985); }
.card.open { border-color: var(--border-light); }

.card-main {
  padding: 16px;
  cursor: pointer;
}
.card-row1 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.card-name {
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.25;
  flex: 1;
}
.card-badge {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 4px 10px;
  border-radius: 100px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-breakfast { background: var(--gold-soft); color: var(--gold); }
.badge-lunch { background: var(--lime-soft); color: var(--lime); }
.badge-dinner { background: var(--fire-soft); color: var(--fire); }
.badge-dessert { background: var(--coral-soft); color: var(--coral); }
.badge-snack { background: var(--sky-soft); color: var(--sky); }
.badge-shake { background: var(--grape-soft); color: var(--grape); }
.badge-dip { background: var(--mint-soft); color: var(--mint); }

.macro-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.macro-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: var(--radius-xs);
  background: var(--surface2);
}
.m-cal { color: var(--fire); }
.m-pro { color: var(--lime); }
.m-carb { color: var(--sky); }
.m-fat { color: var(--gold); }

.card-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.meta-tag {
  font-size: 0.7rem;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 100px;
  background: var(--surface2);
  color: var(--text-secondary);
}
.meta-tag.green { background: var(--lime-soft); color: var(--lime); }

.card-expand-hint {
  text-align: center;
  padding: 6px 0 2px;
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.02em;
}
.card.open .card-expand-hint { display: none; }

/* ─── DETAIL PANEL ─── */
.card-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.card.open .card-detail { max-height: 5000px; }

.detail-body {
  padding: 0 16px 16px;
}
.detail-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 16px;
}
.detail-block {
  margin-bottom: 16px;
}
.detail-block:last-child { margin-bottom: 0; }
.detail-heading {
  font-size: 0.72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--fire);
  margin-bottom: 8px;
}

.ing-list {
  list-style: none;
}
.ing-list li {
  padding: 6px 0;
  padding-left: 18px;
  position: relative;
  font-size: 0.9rem;
  line-height: 1.4;
  color: var(--text);
  border-bottom: 1px solid var(--border);
}
.ing-list li:last-child { border-bottom: none; }
.ing-list li::before {
  content: '';
  position: absolute;
  left: 0; top: 14px;
  width: 7px; height: 7px;
  border-radius: 2px;
  background: var(--fire);
  opacity: 0.4;
}

.step-list {
  list-style: none;
  counter-reset: steps;
}
.step-list li {
  counter-increment: steps;
  padding: 8px 0 8px 36px;
  position: relative;
  font-size: 0.9rem;
  line-height: 1.5;
  color: var(--text);
}
.step-list li::before {
  content: counter(steps);
  position: absolute;
  left: 0; top: 8px;
  width: 24px; height: 24px;
  border-radius: 8px;
  background: var(--fire-soft);
  color: var(--fire);
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

.detail-note {
  background: var(--surface3);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  color: var(--text-secondary);
  border-left: 3px solid var(--fire);
  line-height: 1.4;
}

.empty-state {
  text-align: center;
  padding: 60px 24px;
}
.empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
.empty-state p { color: var(--text-dim); font-size: 0.9rem; }

/* ─── FOOTER ─── */
.footer {
  text-align: center;
  padding: 30px;
  font-size: 4rem;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
}

/* ─── DESKTOP (scales up nicely but mobile is primary) ─── */
@media (min-width: 700px) {
  .recipe-list {
    max-width: 560px;
    margin: 0 auto;
  }
  .controls {
    max-width: 560px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .hero { max-width: 560px; margin: 0 auto; }
  .footer { max-width: 560px; margin: 0 auto; }
  body { background: #0A0A0A; }
}

/* micro-animation for cards appearing */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.card { animation: cardIn 0.3s ease both; }

/* ─── CARD ACCENT BORDERS ─── */
.card.accent-breakfast { border-color: var(--gold); }
.card.accent-lunch { border-color: var(--lime); }
.card.accent-dinner { border-color: var(--fire); }
.card.accent-dessert { border-color: var(--coral); }
.card.accent-snack { border-color: var(--sky); }
.card.accent-shake { border-color: var(--grape); }
.card.accent-dip { border-color: var(--mint); }

/* ─── FAVORITE BUTTON ─── */
.fav-btn {
  width: 32px; height: 32px;
  border: none;
  background: var(--surface2);
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text-dim);
  transition: all 0.2s;
  padding: 0;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fav-btn:active { transform: scale(1.2); }
.fav-btn.faved { background: var(--coral-soft); color: var(--coral); }

/* ─── SCROLL TO TOP ─── */
.scroll-top {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--fire);
  border: none;
  color: #fff;
  font-size: 1.2rem;
  cursor: pointer;
  z-index: 200;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(255,107,53,0.3);
}
.scroll-top.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.scroll-top:active { transform: scale(0.9); }

/* ─── SERVING ADJUSTER ─── */
.serving-adjuster {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding: 10px 14px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
}
.serving-adjuster span {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
}
.serving-adjuster .sv-count {
  font-family: 'Space Mono', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: var(--fire);
  min-width: 24px;
  text-align: center;
}
.sv-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border-light);
  background: var(--surface3);
  color: var(--text);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.sv-btn:active { transform: scale(0.9); background: var(--fire-soft); border-color: var(--fire); }
</style>
</head>
<body>

<div class="hero">
  <span class="hero-emoji">🍱</span>
  <h1>The Snack <span class="accent">Box</span></h1>
  <div class="subtitle">Your meal prep cheat code.</div>

</div>

<div class="controls">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="searchInput" placeholder="Search recipes or ingredients…">
    <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <div class="chips-scroll" id="chipBar"></div>
  <div class="toggles">
    <div class="toggle-pill" id="tPrep" onclick="toggleFilter('tPrep')"><span class="toggle-dot"></span>Meal Prep</div>
    <div class="toggle-pill" id="tOven" onclick="toggleFilter('tOven')"><span class="toggle-dot"></span>No Oven</div>
    <div class="sort-pill" id="sortPill" onclick="cycleSort()"><span id="sortLabel">Sort</span> ↕</div>
  </div>
  <div class="result-tag" id="resultTag"></div>
</div>

<div class="recipe-list" id="recipeList"></div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="footer">👹</div>

// Favorites
let favs = JSON.parse(localStorage.getItem('snackbox-favs') || '[]');
let showFavsOnly = false;

function toggleFav(name, e) {
  e.stopPropagation();
  const idx = favs.indexOf(name);
  if (idx > -1) favs.splice(idx, 1);
  else favs.push(name);
  localStorage.setItem('snackbox-favs', JSON.stringify(favs));
  render();
}

// Scroll to top button
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 600);
});

// Accent class map
const accentMap = {"Breakfast":"accent-breakfast","Lunch":"accent-lunch","Dinner":"accent-dinner","Dessert":"accent-dessert","Snack":"accent-snack","Shake":"accent-shake","Dip/Sauce":"accent-dip"};


// Serving scaler
function parseIngredient(str) {
  const match = str.match(/^([\d.]+)(g|ml|kg|l)\s+(.+)$/);
  if (match) return { a: parseFloat(match[1]), u: match[2], n: match[3] };
  const match2 = str.match(/^([\d.]+)(g|ml|kg|l)$/);
  if (match2) return { a: parseFloat(match2[1]), u: match2[2], n: '' };
  return null;
}

function scaleIngredient(str, ratio) {
  const parsed = parseIngredient(str);
  if (parsed) {
    const scaled = Math.round(parsed.a * ratio * 10) / 10;
    const display = scaled % 1 === 0 ? scaled.toFixed(0) : scaled.toFixed(1);
    return display + parsed.u + (parsed.n ? ' ' + parsed.n : '');
  }
  const countMatch = str.match(/^([\d.]+)\s+(.+)$/);
  if (countMatch) {
    const num = parseFloat(countMatch[1]);
    const scaled = Math.round(num * ratio * 10) / 10;
    const display = scaled % 1 === 0 ? scaled.toFixed(0) : scaled.toFixed(1);
    return display + ' ' + countMatch[2];
  }
  return str;
}

function adjustServings(idx, delta, e) {
  e.stopPropagation();
  const card = document.querySelector('[data-ridx="'+idx+'"]');
  if (!card) return;
  const countEl = card.querySelector('.sv-count');
  const baseSv = R[idx].sv;
  let current = parseInt(countEl.textContent);
  current = Math.max(1, current + delta);
  countEl.textContent = current;
  const ratio = current / baseSv;
  const lis = card.querySelectorAll('.ing-list li');
  R[idx].ig.forEach((orig, i) => {
    if (lis[i]) lis[i].textContent = scaleIngredient(orig, ratio);
  });
}

const cats=["All","Favorites","Breakfast","Lunch","Dinner","Dessert","Snack","Shake","Dip/Sauce"];
const badgeMap={"Breakfast":"badge-breakfast","Lunch":"badge-lunch","Dinner":"badge-dinner","Dessert":"badge-dessert","Snack":"badge-snack","Shake":"badge-shake","Dip/Sauce":"badge-dip"};

let activeCat="All";
let sortIdx=0;
const sorts=[{k:"default",l:"Sort"},{k:"p-desc",l:"Protein ↓"},{k:"p-asc",l:"Protein ↑"},{k:"c-asc",l:"Cal ↑"},{k:"c-desc",l:"Cal ↓"}];
let toggles={tPrep:false,tOven:false};

// Build chips
const chipBar=document.getElementById('chipBar');
cats.forEach(cat=>{
  const el=document.createElement('span');
  el.className='chip'+(cat==='All'?' active':'');
  el.textContent=cat==='Favorites'?'♥ Favs':cat;
  el.onclick=()=>{
    activeCat=cat;
    showFavsOnly=(cat==='Favorites');
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    render();
  };
  chipBar.appendChild(el);
});

function toggleFilter(id){
  toggles[id]=!toggles[id];
  document.getElementById(id).classList.toggle('active',toggles[id]);
  render();
}
function cycleSort(){
  sortIdx=(sortIdx+1)%sorts.length;
  const pill=document.getElementById('sortPill');
  document.getElementById('sortLabel').textContent=sorts[sortIdx].l;
  pill.classList.toggle('active',sorts[sortIdx].k!=='default');
  render();
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').classList.remove('show');
  render();
}

function getList(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  let list=R.filter(r=>{
    if(showFavsOnly&&!favs.includes(r.n))return false;
    if(!showFavsOnly&&activeCat!=="All"&&activeCat!=="Favorites"&&r.c!==activeCat)return false;
    if(toggles.tPrep&&!r.mp)return false;
    if(toggles.tOven&&!r.no)return false;
    if(q){
      const blob=[r.n,r.c,r.m,...r.ig,r.nt].join(' ').toLowerCase();
      return blob.includes(q);
    }
    return true;
  });
  const sk=sorts[sortIdx].k;
  if(sk==='p-desc')list.sort((a,b)=>b.p-a.p);
  else if(sk==='p-asc')list.sort((a,b)=>a.p-b.p);
  else if(sk==='c-asc')list.sort((a,b)=>a.cal-b.cal);
  else if(sk==='c-desc')list.sort((a,b)=>b.cal-a.cal);
  return list;
}

function render(){
  const list=getList();
  const el=document.getElementById('recipeList');
  document.getElementById('resultTag').textContent=list.length+' recipe'+(list.length!==1?'s':'');

  if(!list.length){
    el.innerHTML=showFavsOnly?'<div class="empty-state"><div class="emoji">♡</div><h3>No favorites yet</h3><p>Tap the heart on any recipe to save it.</p></div>':'<div class="empty-state"><div class="emoji">🔍</div><h3>No recipes found</h3><p>Try different filters or search terms.</p></div>';
    return;
  }

  el.innerHTML=list.map((r,i)=>{
    const bc=badgeMap[r.c]||'';
    const pp=r.cal>0?Math.round((r.p*4/r.cal)*100):0;
    let tags=[];
    if(r.mp)tags.push({l:'Meal Prep',g:true});
    if(r.no)tags.push({l:'No Oven',g:true});
    tags.push({l:r.m,g:false});
    if(r.sv>1)tags.push({l:r.sv+' servings',g:false});

    const ac=accentMap[r.c]||'';
    const isFav=favs.includes(r.n);
    const safeName=r.n.replace(/'/g,"\\'");
    const origIdx=R.indexOf(r);
    return `<div class="card ${ac}" data-ridx="${origIdx}" style="animation-delay:${Math.min(i*0.03,0.3)}s" onclick="this.classList.toggle('open')">
      <div class="card-main">
        <div class="card-row1">
          <div class="card-name">${r.n}</div>
          <span class="card-badge ${bc}">${r.c}</span>
          <button class="fav-btn ${isFav?'faved':''}" onclick="toggleFav('${safeName}',event)">${isFav?'♥':'♡'}</button>
        </div>
        <div class="macro-bar">
          <span class="macro-tag m-cal">${r.cal} cal</span>
          <span class="macro-tag m-pro">${r.p}g P · ${pp}%</span>
          <span class="macro-tag m-carb">${r.cb}g C</span>
          <span class="macro-tag m-fat">${r.f}g F</span>
        </div>
        <div class="card-meta">
          ${tags.map(t=>`<span class="meta-tag${t.g?' green':''}">${t.l}</span>`).join('')}
        </div>
        <div class="card-expand-hint">tap for recipe ▾</div>
      </div>
      <div class="card-detail">
        <div class="detail-body">
          <div class="detail-divider"></div>
          <div class="serving-adjuster">
            <span>Servings</span>
            <button class="sv-btn" onclick="adjustServings(${origIdx},-1,event)">&#8722;</button>
            <span class="sv-count">${r.sv}</span>
            <button class="sv-btn" onclick="adjustServings(${origIdx},1,event)">+</button>
          </div>
          <div class="detail-block">
            <div class="detail-heading">Ingredients</div>
            <ul class="ing-list">${r.ig.map(x=>`<li>${x}</li>`).join('')}</ul>
          </div>
          <div class="detail-block">
            <div class="detail-heading">Instructions</div>
            <ol class="step-list">${r.st.map(x=>`<li>${x}</li>`).join('')}</ol>
          </div>
          ${r.nt?`<div class="detail-note">💡 ${r.nt}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// Search input handling
const si=document.getElementById('searchInput');
const cb=document.getElementById('clearBtn');
si.addEventListener('input',()=>{
  cb.classList.toggle('show',si.value.length>0);
  render();

// Stats


render();
