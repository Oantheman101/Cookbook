<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolfe's Cookbook</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0F0F;
  --surface: #1A1A1A;
  --surface2: #242424;
  --surface3: #2E2E2E;
  --border: #333;
  --text: #E8E4DF;
  --text-dim: #8A8580;
  --accent: #E8562A;
  --accent-soft: rgba(232,86,42,0.12);
  --green: #3CB97A;
  --green-soft: rgba(60,185,122,0.12);
  --blue: #4A90D9;
  --blue-soft: rgba(74,144,217,0.12);
  --yellow: #D4A843;
  --yellow-soft: rgba(212,168,67,0.12);
  --purple: #9B72CF;
  --purple-soft: rgba(155,114,207,0.12);
  --pink: #CF6B8E;
  --pink-soft: rgba(207,107,142,0.12);
  --teal: #4AABB5;
  --teal-soft: rgba(74,171,181,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.hero {
  padding: 60px 24px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 50% 80%, rgba(232,86,42,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.4rem, 5vw, 3.6rem);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  position: relative;
}
.hero h1 span { color: var(--accent); }
.hero p {
  color: var(--text-dim);
  font-size: 1.05rem;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 28px;
  position: relative;
}
.stat {
  text-align: center;
}
.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent);
}
.stat-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ─── CONTROLS ─── */
.controls {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 24px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
}
.search-row {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
}
.search-box {
  flex: 1;
  position: relative;
}
.search-box svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  width: 18px; height: 18px;
}
.search-box input {
  width: 100%;
  padding: 12px 16px 12px 42px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text-dim); }

.sort-btn {
  padding: 12px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.sort-btn:hover { border-color: var(--accent); }
.sort-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

.filter-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-chip {
  padding: 7px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  user-select: none;
}
.filter-chip:hover { border-color: var(--text-dim); }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.toggle-row {
  display: flex;
  gap: 16px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.toggle-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
}
.toggle-label input { display: none; }
.toggle-box {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.toggle-label input:checked + .toggle-box {
  background: var(--green);
  border-color: var(--green);
}
.toggle-label input:checked + .toggle-box::after {
  content: '✓';
  color: #fff;
  font-size: 11px;
  font-weight: 700;
}
.result-count {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-dim);
  align-self: center;
}

/* ─── GRID ─── */
.grid {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* ─── CARD ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.25s ease;
  cursor: pointer;
}
.card:hover {
  border-color: var(--text-dim);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.card-header {
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.15rem;
  line-height: 1.3;
  flex: 1;
  padding-right: 12px;
}
.card-cat {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 3px 10px;
  border-radius: 100px;
  white-space: nowrap;
  flex-shrink: 0;
}
.cat-breakfast { background: var(--yellow-soft); color: var(--yellow); }
.cat-lunch { background: var(--green-soft); color: var(--green); }
.cat-dinner { background: var(--accent-soft); color: var(--accent); }
.cat-dessert { background: var(--pink-soft); color: var(--pink); }
.cat-snack { background: var(--blue-soft); color: var(--blue); }
.cat-shake { background: var(--purple-soft); color: var(--purple); }
.cat-dip { background: var(--teal-soft); color: var(--teal); }

.card-macros {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.macro-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--surface2);
}
.macro-pill.cal { color: var(--accent); }
.macro-pill.pro { color: var(--green); }
.macro-pill.carb { color: var(--blue); }
.macro-pill.fat { color: var(--yellow); }

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tag {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--surface3);
  color: var(--text-dim);
}
.tag.highlight { background: var(--green-soft); color: var(--green); }

.expand-indicator {
  text-align: center;
  padding: 8px;
  border-top: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text-dim);
  transition: all 0.2s;
}
.card:hover .expand-indicator { color: var(--accent); }
.card.open .expand-indicator { display: none; }

/* ─── RECIPE DETAIL ─── */
.card-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.card.open .card-detail {
  max-height: 3000px;
}
.detail-inner {
  padding: 0 20px 20px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}
.detail-section {
  margin-bottom: 16px;
}
.detail-section:last-child { margin-bottom: 0; }
.detail-section h4 {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 8px;
}
.detail-section ul {
  list-style: none;
  padding: 0;
}
.detail-section ul li {
  padding: 4px 0;
  padding-left: 16px;
  position: relative;
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.5;
}
.detail-section ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 12px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.5;
}
.detail-section ol {
  padding-left: 24px;
}
.detail-section ol li {
  padding: 5px 0;
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.5;
}
.detail-section ol li::marker {
  color: var(--accent);
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.detail-note {
  background: var(--surface3);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  color: var(--text-dim);
  border-left: 3px solid var(--accent);
}

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 24px;
  color: var(--text-dim);
}
.no-results h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 8px;
}

/* ─── FOOTER ─── */
footer {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-dim);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; padding: 16px; }
  .hero { padding: 40px 16px 28px; }
  .stats-bar { gap: 20px; }
  .controls { padding: 16px 16px 0; }
  .search-row { flex-direction: column; }
}
</style>
</head>

</div>

<div class="grid" id="grid"></div>

<footer>Adapted from <strong>Wolfe's Cookbook</strong> by Adam Wolfe &nbsp;·&nbsp; Built for quick reference & meal planning</footer>

   steps:["Add all ingredients to tupperware. Cap and shake.","Serve with chips (Siete recommended) or veggies."],notes:"Great party dip — 70g protein."},
];

// ── CATEGORIES ──
const categories = ["All","Breakfast","Lunch","Dinner","Dessert","Snack","Shake","Dip/Sauce"];
const catClassMap = {"Breakfast":"cat-breakfast","Lunch":"cat-lunch","Dinner":"cat-dinner","Dessert":"cat-dessert","Snack":"cat-snack","Shake":"cat-shake","Dip/Sauce":"cat-dip"};

let activeFilter = "All";
let sortMode = "default"; // default, protein-desc, protein-asc, cal-asc, cal-desc
const sortModes = [
  {key:"default", label:"Default"},
  {key:"protein-desc", label:"Protein ↓"},
  {key:"protein-asc", label:"Protein ↑"},
  {key:"cal-asc", label:"Calories ↑"},
  {key:"cal-desc", label:"Calories ↓"},
];
let sortIndex = 0;

// Build filter chips
const filtersEl = document.getElementById('filters');
categories.forEach(cat => {
  const chip = document.createElement('span');
  chip.className = 'filter-chip' + (cat === 'All' ? ' active' : '');
  chip.textContent = cat;
  chip.onclick = () => {
    activeFilter = cat;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    render();
  };
  filtersEl.appendChild(chip);
});

function toggleSort() {
  sortIndex = (sortIndex + 1) % sortModes.length;
  sortMode = sortModes[sortIndex].key;
  const btn = document.getElementById('sortBtn');
  btn.querySelector('span').textContent = sortModes[sortIndex].label;
  btn.classList.toggle('active', sortMode !== 'default');
  render();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const mealPrepOnly = document.getElementById('mealPrepOnly').checked;
  const noOvenOnly = document.getElementById('noOvenOnly').checked;

  let list = recipes.filter(r => {
    if (activeFilter !== "All" && r.cat !== activeFilter) return false;
    if (mealPrepOnly && !r.prep) return false;
    if (noOvenOnly && !r.noOven) return false;
    if (q) {
      const blob = [r.name, r.cat, r.method, r.src, ...r.ingredients, r.notes].join(' ').toLowerCase();
      return blob.includes(q);
    }
    return true;
  });

  if (sortMode === 'protein-desc') list.sort((a,b) => b.pro - a.pro);
  else if (sortMode === 'protein-asc') list.sort((a,b) => a.pro - b.pro);
  else if (sortMode === 'cal-asc') list.sort((a,b) => a.cal - b.cal);
  else if (sortMode === 'cal-desc') list.sort((a,b) => b.cal - a.cal);

  return list;
}

function render() {
  const list = getFiltered();
  const grid = document.getElementById('grid');
  document.getElementById('resultCount').textContent = list.length + ' recipe' + (list.length !== 1 ? 's' : '');

  if (!list.length) {
    grid.innerHTML = '<div class="no-results"><h3>No recipes found</h3><p>Try adjusting your filters or search.</p></div>';
    return;
  }

  grid.innerHTML = list.map((r, i) => {
    const catClass = catClassMap[r.cat] || '';
    const proPct = r.cal > 0 ? Math.round((r.pro * 4 / r.cal) * 100) : 0;
    const tags = [];
    if (r.prep) tags.push({label:'Meal Prep', hl:true});
    if (r.noOven) tags.push({label:'No Oven', hl:true});
    tags.push({label:r.method, hl:false});
    if (r.servings > 1) tags.push({label:r.servings + ' servings', hl:false});

    return `<div class="card" onclick="this.classList.toggle('open')">
      <div class="card-header">
        <div class="card-top">
          <div class="card-title">${r.name}</div>
          <span class="card-cat ${catClass}">${r.cat}</span>
        </div>
        <div class="card-macros">
          <span class="macro-pill cal">${r.cal} cal</span>
          <span class="macro-pill pro">${r.pro}g P (${proPct}%)</span>
          <span class="macro-pill carb">${r.carb}g C</span>
          <span class="macro-pill fat">${r.fat}g F</span>
        </div>
        <div class="card-tags">
          ${tags.map(t => `<span class="tag${t.hl?' highlight':''}">${t.label}</span>`).join('')}
        </div>
      </div>
      <div class="expand-indicator">tap to view recipe ▾</div>
      <div class="card-detail">
        <div class="detail-inner">
          <div class="detail-section">
            <h4>Ingredients</h4>
            <ul>${r.ingredients.map(ing => `<li>${ing}</li>`).join('')}</ul>
          </div>
          <div class="detail-section">
            <h4>Instructions</h4>
            <ol>${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
          </div>
          ${r.notes ? `<div class="detail-note">💡 ${r.notes}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// Compute stats
function updateStats() {
  const meals = recipes.filter(r => ['Breakfast','Lunch','Dinner'].includes(r.cat) && r.pro > 0);
  const avgP = Math.round(meals.reduce((s,r) => s + r.pro, 0) / meals.length);
  const avgC = Math.round(meals.reduce((s,r) => s + r.cal, 0) / meals.length);
  document.getElementById('avgProtein').textContent = avgP + 'g';
  document.getElementById('avgCal').textContent = avgC;
}

document.getElementById('search').addEventListener('input', render);
updateStats();
render();
</script>
</body>
</html>
